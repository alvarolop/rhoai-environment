# Default values for rhoai-environment-chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Display name for the Data Science Project
dataScienceProjectDisplayName: RHOAI - Playground

# -- Namespace where the Data Science Project will be created
dataScienceProjectNamespace: rhoai-playground

# -- Data Science Pipelines (DSPA) configuration. Omit this entire section to skip DSPA and pipeline storage setup.
# @default -- See values below
pipelines:
  # -- Storage backend type for pipelines. Options: `minio`, `odf`, `aws`
  storageBackend: minio
  # -- Name of the secret containing pipeline connection credentials
  secretName: dspa-pipelines-connection-secret
  # -- Storage type (currently only s3-compatible is supported)
  type: s3
  # -- Connection scheme. Options: `http`, `https`
  scheme: http
  # -- S3-compatible endpoint URL
  awsS3Endpoint: minio.minio.svc.cluster.local
  # -- S3-compatible endpoint port
  awsS3Port: "9000"
  # -- AWS region (optional, only needed for AWS backend)
  # awsDefaultRegion: ""

# -- List of workbench configurations to deploy. Each workbench creates a Jupyter-compatible notebook environment.
# @default -- See example values below
workbenches:
    # -- Unique name for the workbench (used in resource names)
  - name: notebook
    # -- Display name shown in the RHOAI UI
    displayName: Notebook
    # -- Container image to use for the workbench (e.g., pytorch:2025.2, tensorflow:latest)
    image: pytorch:2025.2
    # -- Hardware profile configuration
    hardwareProfile:
      # -- Name of the hardware profile to use
      name: cpu-profile
      # -- Namespace where the hardware profile is defined
      namespace: redhat-ods-applications
    # -- Description of the workbench shown in the UI
    description: This is an example Workbench using the PyTorch Image
    # -- Storage size for the workbench persistent volume
    storage: 5Gi
    # -- Resource limits and requests for the workbench pod
    resources:
      # -- Resource limits
      limits:
        # -- CPU limit
        cpu: '3'
        # -- Memory limit
        memory: 10Gi
      # -- Resource requests
      requests:
        # -- CPU request
        cpu: '1'
        # -- Memory request
        memory: 6Gi

# Example GPU-enabled workbench configuration:
# workbenches:
#   - name: notebook-gpu
#     displayName: Notebook GPU
#     image: pytorch:2025.2
#     hardwareProfile:
#       name: gpu-profile
#       namespace: redhat-ods-applications
#     description: This is an example Workbench using the PyTorch Image and a NVIDIA GPU
#     storage: 5Gi
#     resources:
#       limits:
#         cpu: '2'
#         memory: 8Gi
#         nvidiaGpu: '1'
#       requests:
#         cpu: '1'
#         memory: 6Gi
#         nvidiaGpu: '1'

# -- Distributed workloads configuration for running training jobs across multiple nodes
distributedWorkloads:
  # -- Enable or disable distributed workloads support
  enabled: true

# -- Kueue configuration for job queueing and resource management
# **Important:** Queue names must match those defined in rhoai-installation-chart
kueue:
  # -- Name of the local queue within the namespace
  localQueueName: default
  # -- Name of the cluster-wide queue
  clusterQueueName: cluster-queue

# -- Model tuning/fine-tuning configuration
modelTunning:
  # -- Enable or disable model tuning capabilities
  enabled: false

